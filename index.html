<body class="bg-japandi-cream text-japandi-charcoal min-h-screen">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- Inline Animated SVG Components ---
    const ZenClearedAnimation = () => (
      <div className="w-48 h-48 flex items-center justify-center relative select-none">
        <svg viewBox="0 0 200 200" className="w-full h-full">
          <circle cx="100" cy="100" r="80" fill="#F5F3EF" stroke="#E3DFD5" strokeWidth="2" strokeDasharray="4 4" />
          <circle cx="100" cy="90" r="30" fill="#C28C7E" className="animate-pulse" style={{ animationDuration: '4s' }} />
          <path d="M 40 135 Q 70 120 100 135 T 160 135" fill="none" stroke="#4F5D4E" strokeWidth="3" strokeLinecap="round" className="animate-sway" />
          <path d="M 40 148 Q 70 133 100 148 T 160 148" fill="none" stroke="#7A756B" strokeWidth="2" strokeLinecap="round" opacity="0.5" />
          <path d="M 60 60 L 62 65 L 67 67 L 62 69 L 60 74 L 58 69 L 53 67 L 58 65 Z" fill="#C28C7E" className="animate-float" style={{ animationDelay: '0.5s' }} />
          <path d="M 145 55 L 147 58 L 151 60 L 147 62 L 145 65 L 143 62 L 139 60 L 143 58 Z" fill="#4F5D4E" className="animate-float" style={{ animationDelay: '1.5s' }} />
        </svg>
      </div>
    );

    const SenseiLoaderAnimation = () => (
      <div className="w-24 h-24 flex items-center justify-center relative select-none">
        <svg viewBox="0 0 100 100" className="w-full h-full">
          <circle cx="50" cy="50" r="40" fill="none" stroke="#E3DFD5" strokeWidth="2" />
          <circle cx="50" cy="50" r="28" fill="none" stroke="#C28C7E" strokeWidth="2.5" className="animate-pulse-ring" />
          <g className="animate-spin-slow origin-center" style={{ transformOrigin: '50px 50px' }}>
            <circle cx="50" cy="20" r="4.5" fill="#4F5D4E" />
            <circle cx="50" cy="80" r="4.5" fill="#4F5D4E" />
            <circle cx="20" cy="50" r="4.5" fill="#4F5D4E" />
            <circle cx="80" cy="50" r="4.5" fill="#4F5D4E" />
          </g>
        </svg>
      </div>
    );

    const SearchEmptyAnimation = () => (
      <div className="w-32 h-32 flex items-center justify-center relative select-none">
        <svg viewBox="0 0 120 120" className="w-full h-full">
          <g className="animate-float">
            <rect x="35" y="20" width="50" height="65" rx="5" fill="#F5F3EF" stroke="#E3DFD5" strokeWidth="2" />
            <line x1="45" y1="35" x2="75" y2="35" stroke="#7A756B" strokeWidth="2" strokeLinecap="round" opacity="0.4" />
            <line x1="45" y1="47" x2="65" y2="47" stroke="#7A756B" strokeWidth="2" strokeLinecap="round" opacity="0.4" />
            <line x1="45" y1="59" x2="75" y2="59" stroke="#7A756B" strokeWidth="2" strokeLinecap="round" opacity="0.4" />
          </g>
          <g className="animate-sway-heavy" style={{ transformOrigin: '75px 75px' }}>
            <circle cx="75" cy="72" r="12" fill="none" stroke="#C28C7E" strokeWidth="2.5" />
            <line x1="84" y1="81" x2="95" y2="92" stroke="#C28C7E" strokeWidth="3" strokeLinecap="round" />
          </g>
        </svg>
      </div>
    );

    const INITIAL_VOCABULARY = [
      { id: '1', spanish: 'tuve una idea', english: 'I came up with an idea', context: 'Used with preterite past tense', box: 1, nextReview: Date.now() },
      { id: '2', spanish: 'Lo que resulta en que', english: 'which results in', context: 'Connector phrase for formal explanations', box: 2, nextReview: Date.now() - 5000 },
      { id: '3', spanish: '¿Cómo se come esto?', english: 'How does that work?', context: 'Idiomatic expression. Lit: How is this eaten?', box: 3, nextReview: Date.now() - 10000 },
      { id: '4', spanish: 'Desde luego', english: 'of course', context: 'Emphatic agreement', box: 4, nextReview: Date.now() - 20000 },
      { id: '5', spanish: 'Tomar el pelo', english: 'to pull someone’s leg', context: 'Lit: to take the hair', box: 5, nextReview: Date.now() + 86400000 }
    ];

    const BOX_INTERVALS = {
      1: 0,
      2: 24 * 60 * 60 * 1000,
      3: 3 * 24 * 60 * 60 * 1000,
      4: 7 * 24 * 60 * 60 * 1000,
      5: 14 * 24 * 60 * 60 * 1000
    };

    const formatTimeRemaining = (targetTime) => {
      const diff = targetTime - Date.now();
      if (diff <= 0) return "Overdue";
      
      const mins = Math.ceil(diff / (60 * 1000));
      if (mins < 60) return `In ${mins}m`;
      
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `In ${hrs}h`;
      
      const days = Math.floor(hrs / 24);
      return `In ${days}d`;
    };

    function App() {
      const [flashcards, setFlashcards] = useState(() => {
        const local = localStorage.getItem('satori_lingo_cards');
        return local ? JSON.parse(local) : INITIAL_VOCABULARY;
      });

      const [apiKey, setApiKey] = useState(() => {
        return localStorage.getItem('satori_lingo_apikey') || '';
      });

      const [activeTab, setActiveTab] = useState('study');
      const [sessionCards, setSessionCards] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [isRevealed, setIsRevealed] = useState(false);

      const [bulkInput, setBulkInput] = useState('');
      const [customTopic, setCustomTopic] = useState('');
      const [aiGeneratingTopic, setAiGeneratingTopic] = useState(false);

      const [manualSpanish, setManualSpanish] = useState('');
      const [manualEnglish, setManualEnglish] = useState('');
      const [manualContext, setManualContext] = useState('');

      const [searchQuery, setSearchQuery] = useState('');
      const [filterBox, setFilterBox] = useState('all');
      const [filterStatus, setFilterStatus] = useState('all');
      const [editingCardId, setEditingCardId] = useState(null);
      const [editSpanish, setEditSpanish] = useState('');
      const [editEnglish, setEditEnglish] = useState('');
      const [editContext, setEditContext] = useState('');

      const [aiSenseiLoading, setAiSenseiLoading] = useState(false);
      const [aiSenseiContent, setAiSenseiContent] = useState(null);
      const [aiMnemonicLoading, setAiMnemonicLoading] = useState(false);

      const [toast, setToast] = useState(null);
      const [customConfirm, setCustomConfirm] = useState(null);
      const fileInputRef = useRef(null);

      const [timeTick, setTimeTick] = useState(Date.now());
      useEffect(() => {
        const interval = setInterval(() => setTimeTick(Date.now()), 30000);
        return () => clearInterval(interval);
      }, []);

      useEffect(() => {
        localStorage.setItem('satori_lingo_cards', JSON.stringify(flashcards));
      }, [flashcards]);

      useEffect(() => {
        localStorage.setItem('satori_lingo_apikey', apiKey);
      }, [apiKey]);

      const triggerToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 4000);
      };

      const dueCards = useMemo(() => {
        const now = Date.now();
        return flashcards
          .filter(card => card.nextReview <= now)
          .sort((a, b) => a.nextReview - b.nextReview);
      }, [flashcards]);

      const boxStats = useMemo(() => {
        const now = Date.now();
        const stats = {
          1: { total: 0, overdue: 0 },
          2: { total: 0, overdue: 0 },
          3: { total: 0, overdue: 0 },
          4: { total: 0, overdue: 0 },
          5: { total: 0, overdue: 0 }
        };
        flashcards.forEach(card => {
          if (stats[card.box] !== undefined) {
            stats[card.box].total++;
            if (card.nextReview <= now) {
              stats[card.box].overdue++;
            }
          }
        });
        return stats;
      }, [flashcards, timeTick]);

      const startStudySession = () => {
        if (dueCards.length > 0) {
          setSessionCards([...dueCards]);
          setCurrentIndex(0);
          setIsRevealed(false);
          setAiSenseiContent(null);
        } else {
          setSessionCards([]);
        }
      };

      useEffect(() => {
        if (activeTab === 'study') {
          startStudySession();
        }
      }, [activeTab]);

      // --- Database Export Logic Engine ---
      const handleExportJSON = () => {
        try {
          const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(flashcards, null, 2));
          const downloadAnchor = document.createElement('a');
          downloadAnchor.setAttribute("href", dataStr);
          downloadAnchor.setAttribute("download", `satori_lingo_backup_${new Date().toISOString().slice(0,10)}.json`);
          document.body.appendChild(downloadAnchor);
          downloadAnchor.click();
          downloadAnchor.remove();
          triggerToast("Vocabulary database backup exported successfully!", "success");
        } catch (err) {
          console.error(err);
          triggerToast("Failed to compile database export file asset.", "error");
        }
      };

      // --- Database Import Logic Engine ---
      const handleImportJSON = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const parsedData = JSON.parse(event.target.result);
            if (!Array.isArray(parsedData)) {
              triggerToast("Import failed: Backup file formatting must be a valid array.", "error");
              return;
            }

            let insertedCount = 0;
            let duplicateCount = 0;
            const absoluteDeckCopy = [...flashcards];

            parsedData.forEach(incomingCard => {
              if (!incomingCard.spanish || !incomingCard.english) return;

              const collisionDetected = absoluteDeckCopy.some(
                existing => existing.spanish.toLowerCase().trim() === incomingCard.spanish.toLowerCase().trim()
              );

              if (!collisionDetected) {
                absoluteDeckCopy.push({
                  id: incomingCard.id || Date.now().toString() + Math.random().toString(36).substr(2, 5),
                  spanish: incomingCard.spanish.trim(),
                  english: incomingCard.english.trim(),
                  context: incomingCard.context ? incomingCard.context.trim() : null,
                  box: typeof incomingCard.box === 'number' ? Math.max(1, Math.min(5, incomingCard.box)) : 1,
                  nextReview: typeof incomingCard.nextReview === 'number' ? incomingCard.nextReview : Date.now(),
                  aiSenseiCached: incomingCard.aiSenseiCached || null,
                  aiMnemonicCached: incomingCard.aiMnemonicCached || null
                });
                insertedCount++;
              } else {
                duplicateCount++;
              }
            });

            setFlashcards(absoluteDeckCopy);
            triggerToast(`Import completed. Added ${insertedCount} items. (Skipped ${duplicateCount} duplicates)`, "success");
            if (fileInputRef.current) fileInputRef.current.value = ''; // Clean field reference
          } catch (parseErr) {
            console.error(parseErr);
            triggerToast("Failed to parse JSON file structure. Verify syntax integrity.", "error");
          }
        };
        reader.readAsText(file);
      };

      const callGeminiAPI = async (endpoint, payload, retries = 5, delay = 1000) => {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${endpoint}?key=${apiKey}`;
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!response.ok) {
            throw new Error(`Google API returned status ${response.status}`);
          }
          return await response.json();
        } catch (error) {
          if (retries > 0) {
            await new Promise(res => setTimeout(res, delay));
            return callGeminiAPI(endpoint, payload, retries - 1, delay * 2);
          }
          throw error;
        }
      };

      const handleAskAiSensei = async (card) => {
        if (!apiKey) {
          triggerToast("Please add your Google AI Studio API key in settings to use AI features.", "error");
          return;
        }
        setAiSenseiLoading(true);
        setAiSenseiContent(null);

        const promptText = `Act as an expert bilingual Spanish language coach. Break down the phrase: "${card.spanish}" (meaning: "${card.english}"). 
        Provide:
        1. A literal translation breakdown.
        2. Important grammatical nuances or verbs used.
        3. Real-world context, situational cues, or regional slang details.
        Make it brief, educational, beautifully formatted in clean, professional markdown, and encouraging. Do NOT mention speech or audio details.`;

        const payload = { contents: [{ parts: [{ text: promptText }] }] };

        try {
          const data = await callGeminiAPI('gemini-2.5-flash-preview-09-2025:generateContent', payload);
          const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text;
          if (responseText) {
            setAiSenseiContent(responseText);
            setFlashcards(prev => prev.map(c => c.id === card.id ? { ...c, aiSenseiCached: responseText } : c));
            triggerToast("AI Sensei explanation loaded and cached!", "success");
          } else {
            throw new Error("Empty response received from API");
          }
        } catch (err) {
          console.error(err);
          triggerToast("Failed to fetch AI Sensei context. Check network or API key.", "error");
        } finally {
          setAiSenseiLoading(false);
        }
      };

      const handleSketchMnemonic = async (card) => {
        if (!apiKey) {
          triggerToast("Please add your Google AI Studio API key in settings to use AI features.", "error");
          return;
        }
        setAiMnemonicLoading(true);

        const promptText = `A minimalist, clean Japandi style design, stamp, or conceptual line sketch representing the language concept: "${card.spanish}" which means "${card.english}". Subtle beige or neutral earth-tone backdrop, premium hand-drawn fine line art style, aesthetic balance, absolute clarity, no letters or words.`;
        const payload = { instances: [{ prompt: promptText }], parameters: { sampleCount: 1 } };

        try {
          const data = await callGeminiAPI('imagen-4.0-generate-001:predict', payload);
          const base64Bytes = data.predictions?.[0]?.bytesBase64Encoded;
          if (base64Bytes) {
            const imageUrl = `data:image/png;base64,${base64Bytes}`;
            setFlashcards(prev => prev.map(c => c.id === card.id ? { ...c, aiMnemonicCached: imageUrl } : c));
            triggerToast("Mnemonic sketch generated successfully!", "success");
          } else {
            throw new Error("No image data returned in payload");
          }
        } catch (err) {
          console.error(err);
          triggerToast("Failed to sketch mnemonic image. Check AI billing, configuration, or key.", "error");
        } finally {
          setAiMnemonicLoading(false);
        }
      };

      const handleGenerateTopicDeck = async () => {
        if (!apiKey) {
          triggerToast("Please enter an API Key in settings first.", "error");
          return;
        }
        if (!customTopic.trim()) {
          triggerToast("Please describe a scenario (e.g. Asking directions in Seville)", "error");
          return;
        }
        setAiGeneratingTopic(true);

        const systemPrompt = "You are a specialized Spanish vocabulary generator that outputs pure, valid JSON arrays for import into a language-learning spaced repetition tool.";
        const userPrompt = `Generate a highly structured collection of exactly 8 highly-authentic, practical, natural Spanish-English phrases for the scenario: "${customTopic}". 
        Clean up any checklist brackets. If there are regional specifics, put them inside bracketed context notes.
        Do not add codeblock styling outside of pure JSON. Use this exact JSON structure:
        {
          "cards": [
            {
              "spanish": "Spanish target phrase",
              "english": "Natural English meaning",
              "context": "Brief context details [e.g. used in Spain / informal]"
            }
          ]
        }`;

        const payload = {
          contents: [{ parts: [{ text: userPrompt }] }],
          systemInstruction: { parts: [{ text: systemPrompt }] },
          generationConfig: {
            responseMimeType: "application/json",
            responseSchema: {
              type: "OBJECT",
              properties: {
                cards: {
                  type: "ARRAY",
                  items: {
                    type: "OBJECT",
                    properties: {
                      spanish: { type: "STRING" },
                      english: { type: "STRING" },
                      context: { type: "STRING", nullable: true }
                    },
                    required: ["spanish", "english"]
                  }
                }
              },
              required: ["cards"]
            }
          }
        };

        try {
          const data = await callGeminiAPI('gemini-2.5-flash-preview-09-2025:generateContent', payload);
          const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
          const parsed = JSON.parse(rawText);

          if (parsed && Array.isArray(parsed.cards)) {
            let addedCount = 0;
            const updatedList = [...flashcards];

            parsed.cards.forEach(card => {
              const isDuplicate = flashcards.some(
                existing => existing.spanish.toLowerCase() === card.spanish.trim().toLowerCase()
              );
              if (!isDuplicate) {
                updatedList.push({
                  id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
                  spanish: card.spanish.trim(),
                  english: card.english.trim(),
                  context: card.context ? card.context.trim() : null,
                  box: 1,
                  nextReview: Date.now()
                });
                addedCount++;
              }
            });

            setFlashcards(updatedList);
            setCustomTopic('');
            triggerToast(`AI added ${addedCount} custom phrases for: "${customTopic}"!`, "success");
          } else {
            throw new Error("Invalid output layout from JSON compiler");
          }
        } catch (err) {
          console.error(err);
          triggerToast("AI Topic builder encountered an processing error. Try standardizing your prompt.", "error");
        } finally {
          setAiGeneratingTopic(false);
        }
      };

      const parseKeepLines = (text) => {
        const lines = text.split('\n');
        const parsed = [];
        
        lines.forEach(line => {
          let cleanLine = line.trim();
          if (!cleanLine) return;

          cleanLine = cleanLine.replace(/^\[\s*[xX]?\s*\]\s*/, '');

          let extractedContext = null;
          const bracketMatch = cleanLine.match(/\[(.*?)\]/);
          if (bracketMatch) {
            extractedContext = bracketMatch[1].trim();
            cleanLine = cleanLine.replace(/\[.*?\]/, '').trim();
          }

          const parts = cleanLine.split(/\s*(?:[-–—])\s*/);
          if (parts.length >= 2) {
            const spanish = parts[0].trim();
            const english = parts.slice(1).join(' - ').trim();
            if (spanish && english) {
              parsed.push({ spanish, english, context: extractedContext });
            }
          } else if (cleanLine.length > 0) {
            parsed.push({ spanish: cleanLine, english: '', context: extractedContext });
          }
        });
        return parsed;
      };

      const handleLoadIngestData = () => {
        if (!bulkInput.trim()) {
          triggerToast("Please input some lines to parse.", "error");
          return;
        }

        const parsedCards = parseKeepLines(bulkInput);
        if (parsedCards.length === 0) {
          triggerToast("Could not extract any cards. Make sure phrases are separated by dashes.", "error");
          return;
        }

        let duplicatesFiltered = 0;
        const freshDeck = [...flashcards];

        parsedCards.forEach(parsed => {
          const isDuplicate = flashcards.some(
            card => card.spanish.toLowerCase() === parsed.spanish.toLowerCase()
          );

          if (!isDuplicate) {
            freshDeck.push({
              id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
              spanish: parsed.spanish,
              english: parsed.english,
              context: parsed.context,
              box: 1, 
              nextReview: Date.now()
            });
          } else {
            duplicatesFiltered++;
          }
        });

        setFlashcards(freshDeck);
        setBulkInput('');
        triggerToast(`Successfully loaded ${parsedCards.length - duplicatesFiltered} cards!`, "success");
      };

      const handleGradeCard = (gotIt) => {
        if (sessionCards.length === 0 || currentIndex >= sessionCards.length) return;
        const currentCard = sessionCards[currentIndex];

        let newBox = currentCard.box;
        if (gotIt) {
          newBox = Math.min(5, currentCard.box + 1);
        } else {
          newBox = 1; 
        }

        const calculatedInterval = BOX_INTERVALS[newBox];
        const nextReviewTimestamp = Date.now() + calculatedInterval;

        setFlashcards(prev =>
          prev.map(c => c.id === currentCard.id ? { ...c, box: newBox, nextReview: nextReviewTimestamp } : c)
        );

        if (!gotIt) {
          const updatedCardWithReset = { ...currentCard, box: 1, nextReview: Date.now() };
          setSessionCards(prev => [...prev, updatedCardWithReset]);
          triggerToast("Kept in cycle. Appended to back of queue!", "info");
        } else {
          triggerToast(`Advanced to Box ${newBox}!`, "success");
        }

        setIsRevealed(false);
        setAiSenseiContent(null);
        setCurrentIndex(prev => prev + 1);
      };

      const handleManualAdd = (e) => {
        e.preventDefault();
        if (!manualSpanish.trim() || !manualEnglish.trim()) {
          triggerToast("Both Spanish phrase and English translation are required.", "error");
          return;
        }

        const isDuplicate = flashcards.some(
          c => c.spanish.toLowerCase().trim() === manualSpanish.toLowerCase().trim()
        );

        if (isDuplicate) {
          triggerToast("This exact Spanish phrase already exists.", "error");
          return;
        }

        const newCard = {
          id: Date.now().toString(),

                                <td class="px-4 md:px-6 py-3.5 text-center">
                                  <div class="flex flex-col items-center gap-0.5">
                                    <span class="inline-block px-2 py-0.5 bg-japandi-paper border rounded-full font-bold text-[11px]">Box {card.box}</span>
                                    <span class={`text-[10px] font-semibold px-1.5 py-0.5 rounded ${currentOverdueStatus ? 'bg-red-50 text-red-700' : 'bg-japandi-olive/10 text-japandi-olive'}`}>
                                      {currentOverdueStatus ? "🚨 Overdue" : `⏳ ${formatTimeRemaining(card.nextReview)}`}
                                    </span>
                                  </div>
                                </td>
                                <td class="px-4 md:px-6 py-3.5 text-right">
                                  <div class="flex items-center justify-end gap-1.5">
                                    {isEditing ? (
                                      <>
                                        <button onClick={handleSaveEdit} class="px-2.5 py-1 bg-japandi-olive text-white text-[11px] font-bold rounded-lg min-h-[28px]">Save</button>
                                        <button onClick={() => setEditingCardId(null)} class="px-2.5 py-1 bg-japandi-paper text-[11px] font-bold rounded-lg border min-h-[28px]">Cancel</button>
                                      </>
                                    ) : (
                                      <>
                                        <button onClick={() => { handleStartEdit(card) }} class="px-2.5 py-1 bg-japandi-paper border text-[11px] font-bold rounded-lg text-japandi-charcoal min-h-[28px]">Edit</button>
                                        <button onClick={() => handleDeleteCard(card.id)} class="px-2.5 py-1 bg-red-50 text-red-600 text-[11px] font-bold rounded-lg min-h-[28px]">Delete</button>
                                      </>
                                    )}
                                  </div>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  ) : (
                    <div class="text-center py-10 text-japandi-muted text-xs flex flex-col items-center">
                      <SearchEmptyAnimation />
                      <p>No cards match the active filter configurations.</p>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* VIEW C: BULK ADD & IMPORT KEEP */}
            {activeTab === 'ingest' && (
              <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-8">
                <div class="bg-white border border-japandi-border rounded-2xl p-4 md:p-6 shadow-sm flex flex-col justify-between">
                  <div>
                    <h3 class="serif-font text-xl font-extrabold mb-2">Ingest Google Keep</h3>
                    <textarea rows="6" placeholder="[] tuve una idea- to came up with an idea" value={bulkInput} onChange={(e) => setBulkInput(e.target.value)} class="w-full px-3 py-2.5 text-xs bg-japandi-cream border rounded-xl font-mono" ></textarea>
                  </div>
                  <button onClick={handleLoadIngestData} class="w-full py-3.5 bg-japandi-olive text-white font-bold text-xs uppercase tracking-wider rounded-xl mt-4">Load & Filter Duplicate Phrases</button>
                </div>

                <div class="bg-white border border-japandi-border rounded-2xl p-4 md:p-6 shadow-sm flex flex-col justify-between gap-4">
                  <div>
                    <h3 class="serif-font text-xl font-extrabold mb-2">AI Topic Deck Generator</h3>
                    <input type="text" placeholder="e.g., Checking into a boutique hotel in Seville" value={customTopic} onChange={(e) => setCustomTopic(e.target.value)} class="w-full px-3 py-2.5 text-xs bg-japandi-cream border rounded-xl min-h-[38px]" />
                  </div>
                  <button onClick={handleGenerateTopicDeck} disabled={aiGeneratingTopic || !apiKey} class="w-full py-3.5 bg-japandi-terracotta text-white font-bold text-xs uppercase tracking-wider rounded-xl disabled:opacity-50 min-h-[44px]">
                    {aiGeneratingTopic ? "Consulting Model..." : "Generate AI Custom Scenario Deck"}
                  </button>
                </div>
              </div>
            )}

            {/* VIEW D: AI SETTINGS */}
            {activeTab === 'settings' && (
              <div class="bg-white border rounded-2xl p-5 md:p-8 max-w-2xl mx-auto">
                <h3 class="serif-font text-xl font-extrabold mb-2">AI Setup & Key Settings</h3>
                <input type="password" placeholder="Paste your AIzaSy... developer key" value={apiKey} onChange={(e) => setApiKey(e.target.value)} class="w-full px-4 py-3 text-xs bg-japandi-cream border rounded-xl font-mono" />
                <button onClick={handleClearAllData} class="px-4 py-3 bg-red-600 text-white text-xs uppercase tracking-wider font-bold rounded-xl mt-6">Clear All Flashcard Data</button>
              </div>
            )}

          </main>

          <footer class="mt-12 pt-5 border-t border-japandi-border text-center text-[11px] text-japandi-muted">
            <p>© 2026 Satori Lingo Workspace. Silent PWA Leitner Box Mode with Data Portability Engine.</p>
          </footer>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Satori Lingo Service Worker active and registered:', reg.scope))
          .catch(err => console.error('Service Worker fallback registration failed:', err));
      });
    }
  </script>
</body>
</html>
